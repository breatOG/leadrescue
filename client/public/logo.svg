<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d7a6c"/>
      <stop offset="100%" stop-color="#074d42"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- ── L ── -->
  <rect x="58" y="92" width="72" height="318" rx="8" fill="white"/>
  <rect x="58" y="338" width="196" height="72" rx="8" fill="white"/>

  <!-- ── R  vertical bar ── -->
  <rect x="278" y="92" width="72" height="318" rx="8" fill="white"/>

  <!--
    R bowl: donut D-shape using evenodd fill rule.
    Both sub-paths trace the RIGHT half of their ellipse clockwise (sweep=1).
    The even-odd rule makes the overlapping region transparent → hollow bowl.
    Outer: center (350,189), rx=118, ry=97  → top (350,92)  bottom (350,286)
    Inner: center (350,188), rx=60,  ry=44  → top (350,144) bottom (350,232)
  -->
  <path fill-rule="evenodd" fill="white" d="
    M 350 92  A 118 97 0 0 1 350 286 Z
    M 350 144 A 60  44 0 0 1 350 232 Z
  "/>

  <!-- R diagonal leg -->
  <line x1="364" y1="276" x2="448" y2="410"
        stroke="white" stroke-width="72" stroke-linecap="round"/>

  <!-- ── Speech bubble (upper-right) ── -->
  <path d="
    M 363 24 Q 345 24 345 42
    L 345 140 Q 345 158 363 158
    L 372 158 L 363 183 L 390 158
    L 479 158 Q 497 158 497 140
    L 497 42  Q 497 24  479 24 Z
  " fill="none" stroke="#6de4d0" stroke-width="18" stroke-linejoin="round"/>

  <circle cx="385" cy="93"  r="13" fill="#6de4d0"/>
  <circle cx="421" cy="93"  r="13" fill="#6de4d0"/>
  <circle cx="457" cy="93"  r="13" fill="#6de4d0"/>

  <!-- ── Swoosh ── -->
  <path d="M 46 428 Q 256 488 458 400"
        fill="none" stroke="#6de4d0" stroke-width="18" stroke-linecap="round"/>
</svg>
